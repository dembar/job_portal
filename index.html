<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Masias - Job Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span>💼</span>
                    <span>Job Portal</span>
                </div>
                <div class="header-info">
                    <button class="btn-verify" id="verifyLinksBtn" title="Verify all application links">
                        <span>🔗</span> Verify Links
                    </button>
                    <span class="last-updated" id="lastUpdated"></span>
                    <button class="btn-refresh" id="refreshBtn" title="Refresh jobs">
                        <span>🔄</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Section -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon it-support"><span>💻</span></div>
                    <div class="stat-info">
                        <span class="stat-number" id="itSupportCount">0</span>
                        <span class="stat-label">IT Support Positions</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon maintenance"><span>🔧</span></div>
                    <div class="stat-info">
                        <span class="stat-number" id="maintenanceCount">0</span>
                        <span class="stat-label">Maintenance Positions</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon metrology"><span>📐</span></div>
                    <div class="stat-info">
                        <span class="stat-number" id="metrologyCount">0</span>
                        <span class="stat-label">Metrology Positions</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon applied"><span>✅</span></div>
                    <div class="stat-info">
                        <span class="stat-number" id="appliedCount">0</span>
                        <span class="stat-label">Applied</span>
                    </div>
                </div>
            </section>

            <!-- Filters -->
            <section class="filters-section">
                <div class="filter-group">
                    <label>Category</label>
                    <select id="categoryFilter">
                        <option value="all">All Categories</option>
                        <option value="it_support">IT Support</option>
                        <option value="maintenance">Maintenance Technician</option>
                        <option value="metrology">Metrology</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Location</label>
                    <select id="locationFilter">
                        <option value="all">All Locations</option>
                        <option value="remote">Remote Only</option>
                        <option value="kitchener">Kitchener, ON (10Km)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="sortBy">
                        <option value="score">Match Score</option>
                        <option value="salary">Salary</option>
                        <option value="date">Date Posted</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select id="statusFilter">
                        <option value="all">All</option>
                        <option value="not_applied">Not Applied</option>
                        <option value="applied">Applied</option>
                        <option value="interview">Interview</option>
                        <option value="discarded">Discarded</option>
                    </select>
                </div>
                <div class="filter-group filter-checkbox">
                    <label class="checkbox-label">
                        <input type="checkbox" id="showDiscarded">
                        <span>Show Discarded & Rejected</span>
                    </label>
                </div>
            </section>

            <!-- Category Tabs -->
            <section class="category-tabs">
                <button class="tab-btn active" data-category="all">
                    <span>📊</span> All Jobs
                </button>
                <button class="tab-btn" data-category="it_support">
                    <span>💻</span> IT Support
                </button>
                <button class="tab-btn" data-category="maintenance">
                    <span>🔧</span> Maintenance
                </button>
                <button class="tab-btn" data-category="metrology">
                    <span>📐</span> Metrology
                </button>
            </section>

            <!-- Jobs Grid -->
            <section class="jobs-section">
                <div class="jobs-grid" id="jobsGrid">
                    <!-- Jobs will be dynamically inserted here -->
                </div>
            </section>
        </main>

        <!-- Job Detail Modal -->
        <div class="modal-overlay" id="jobModal">
            <div class="modal-content">
                <button class="modal-close" id="modalClose">&times;</button>
                <div class="modal-header">
                    <div class="modal-company-logo" id="modalLogo"></div>
                    <div class="modal-title">
                        <h2 id="modalPosition"></h2>
                        <h3 id="modalCompany"></h3>
                        <div class="modal-meta">
                            <span id="modalLocation"><span>📍</span></span>
                            <span id="modalSalary"><span>💰</span></span>
                            <span id="modalScore"><span>⭐</span></span>
                        </div>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="modal-section">
                        <h4>Description</h4>
                        <p id="modalDescription"></p>
                    </div>
                    <div class="modal-section">
                        <h4>Requirements</h4>
                        <ul id="modalRequirements"></ul>
                    </div>
                    <div class="modal-section">
                        <h4>Application Status</h4>
                        <div class="status-buttons">
                            <button class="status-btn" data-status="not_applied">Not Applied</button>
                            <button class="status-btn" data-status="applied">Applied</button>
                            <button class="status-btn" data-status="interview">Interview</button>
                            <button class="status-btn" data-status="rejected">Rejected</button>
                            <button class="status-btn" data-status="discarded">Discarded</button>
                        </div>
                        <div class="notes-section">
                            <label>Notes:</label>
                            <textarea id="applicationNotes" placeholder="Add notes about this application..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <div class="link-status" id="linkStatus">
                        <span class="link-unchecked">🔍 Link not verified yet</span>
                    </div>
                    <div class="modal-buttons">
                        <button class="btn-download-cv" id="modalDownloadCV">
                            <span>📄</span> Download CV
                        </button>
                        <a href="#" class="btn-apply" id="modalApply" target="_blank">
                            <span>📨</span> Apply Now
                        </a>
                        <a href="#" class="btn-career" id="modalCareer" target="_blank">
                            <span>🏢</span> Career Page
                        </a>
                        <button class="btn-discard-modal" id="modalDiscard">
                            <span>🗑️</span> Discard
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Application Log Sidebar -->
        <aside class="log-sidebar" id="logSidebar">
            <div class="log-header">
                <h3><span>📜</span> Application Log</h3>
                <button class="btn-close-log" id="closeLog">&times;</button>
            </div>
            <div class="log-content" id="logContent">
                <!-- Log entries will be inserted here -->
            </div>
        </aside>

        <!-- Toggle Log Button -->
        <button class="btn-toggle-log" id="toggleLog">
            <span>📋</span>
            <span class="log-badge" id="logBadge">0</span>
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
